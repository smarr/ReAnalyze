name: CI

on: [push, pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux Biolinum font
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fontconfig fonts-linuxlibertine
          fc-cache -f -v

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Run Black
        if: always()
        run: python3.14 -m black --check reanalyze tests

      - name: Run isort
        if: always()
        run: python3.14 -m isort --check-only reanalyze tests

      - name: Run Pylint
        if: always()
        run: python3.14 -m pylint reanalyze tests

      - name: Run Flake8
        if: always()
        run: python3.14 -m flake8 reanalyze tests

      - name: Run mypy
        if: always()
        run: python3.14 -m mypy reanalyze tests

      - name: Verify Linux Biolinum visible to matplotlib
        if: always()
        run: |
          python3.14 -c "from matplotlib import font_manager; fonts = {f.name for f in font_manager.fontManager.ttflist}; assert ('Linux Biolinum O' in fonts or 'Linux Biolinum' in fonts), 'Linux Biolinum font not found by matplotlib'"

      - name: Run pytest
        if: always()
        run: python3.14 -m pytest
